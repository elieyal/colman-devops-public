name: upload my image to DockerHub
on:
  push:
    branches:
      - main
jobs:
  docker_build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Login to Docker Hub
        uses: docker/login-action@v1
        with:
          username: ${{ secrets.DOCKER_USER }}
          password: ${{ secrets.DOCKER_TOKEN }}
      - name: Build
        run: docker build . --tag ${{ secrets.DOCKER_USER }}/calculator:latest

      - name: push to DockerHub
        run: docker push ${{ secrets.DOCKER_USER }}/calculator:latest
        
  deploy:
    needs: docker_build
    runs-on: ubuntu-latest
    steps:
      - name: deploy app
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USER }}
          key: ${{ secrets.PRIVATE_KEY }}
          port: ${{ secrets.PORT }}
          script_stop: true
          script: |
             cd /opt && sudo docker compose pull && sudo docker compose up -d